<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PLATFORMX by TRIDENTX · Telecom Data & Agentic Use-Case Marketplace</title>
  <meta name="description" content="PlatformX — the telecom data + agentic use-case marketplace. Connect data, pick a use-case, build your own journey." />

  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%231E40AF'/%3E%3Cpath d='M16 7v18M10 11a8 8 0 0 1 12 0M7 8a12 12 0 0 1 18 0' stroke='%2306B6D4' stroke-width='2.4' fill='none' stroke-linecap='round'/%3E%3C/svg%3E" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  <link rel="stylesheet" href="assets/css/design-system.css?v=2" />
  <link rel="stylesheet" href="assets/css/app.css?v=1" />
</head>
<body>
  <div class="app" id="app">
    <div class="brandblock">
      <div class="brand-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round">
          <path d="M12 4v16"/><path d="M7.5 8a7 7 0 0 1 9 0"/><path d="M4.5 5a11 11 0 0 1 15 0"/>
        </svg>
      </div>
      <div class="brand-name"><b>PLATFORMX</b><span>by TRIDENTX</span></div>
    </div>

    <header class="topbar">
      <div class="ctx" id="crumb"><span class="crumb">Data Layer</span></div>
      <div class="spacer"></div>
      <label class="gsearch" id="gsearch" title="Ask PLATFORMX across your data">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="gsearchInput" placeholder="Ask PLATFORMX across your telecom data…" autocomplete="off" />
        <span class="kbd">/</span>
      </label>
      <div class="spacer"></div>
      <span class="env-badge" title="This demo runs entirely on synthetic data"><span class="dot"></span>Simulated data</span>
      <button class="iconbtn" id="navToggle" title="Collapse menu"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg></button>
      <div class="avatar" title="Network Ops Lead">NL</div>
    </header>

    <nav class="sidebar" id="sidebar"></nav>

    <main class="main" id="main">
      <div class="view" id="view"></div>
    </main>
  </div>

  <!-- omni copilot -->
  <aside class="copilot" id="copilot">
    <div class="agent-head">
      <div class="agent-avatar">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><path d="M12 8V4H8"/><rect x="4" y="8" width="16" height="12" rx="2"/><path d="M2 14h2M20 14h2M15 13v2M9 13v2"/></svg>
        <span class="live"></span>
      </div>
      <div class="who"><b>PLATFORMX Agent</b><span>Across RF · business · all data</span></div>
      <div style="flex:1"></div>
      <button class="iconbtn" id="copilotClose" title="Close"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
    </div>
    <div class="chat-scroll" id="copilotScroll"></div>
    <div class="composer" id="copilotComposer"></div>
  </aside>

  <script src="assets/js/data.js?v=1"></script>
  <script src="assets/js/data-platform.js?v=2"></script>
  <script src="assets/js/components.js?v=1"></script>
  <script src="assets/js/charts.js?v=1"></script>
  <script src="assets/js/map.js?v=1"></script>
  <script src="assets/js/agent.js?v=2"></script>
  <script src="assets/js/agent-platform.js?v=2"></script>
  <script src="assets/js/chat.js?v=1"></script>
  <script src="assets/js/data-explore.js?v=3"></script>
  <script src="assets/js/rca.js?v=1"></script>
  <script src="assets/js/router.js?v=1"></script>
  <script src="assets/js/app.js?v=3"></script>
</body>
</html>
